name: Build & Release

on:
  push:
    tags:
      - 'v*'
      - '!panel-v*'

permissions:
  contents: write

env:
  GO_VERSION: '1.23'
  NODE_VERSION: '20'

jobs:
  # ─── Build spoof-tunnel (CGO_ENABLED=0, all platforms) ───
  build-tunnel:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: freebsd
            goarch: amd64
          - goos: freebsd
            goarch: arm64
          - goos: openbsd
            goarch: amd64
          - goos: openbsd
            goarch: arm64

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Build
        env:
          CGO_ENABLED: 0
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          BINARY_NAME="spoof-${{ matrix.goos }}-${{ matrix.goarch }}"
          go build -ldflags="-s -w" -o "${BINARY_NAME}" ./cmd/spoof/
          echo "BINARY_NAME=${BINARY_NAME}" >> $GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: spoof-${{ matrix.goos }}-${{ matrix.goarch }}
          path: ${{ env.BINARY_NAME }}
          retention-days: 1

  # ─── Build panel frontend ───
  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install & Build
        working-directory: panel/frontend
        run: |
          npm ci
          npm run build

      - name: Upload frontend build
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: panel/frontend/out/
          retention-days: 1

  # ─── Build panel (pure Go, CGO_ENABLED=0, static binary) ───
  build-panel:
    needs: build-frontend
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Download frontend build
        uses: actions/download-artifact@v4
        with:
          name: frontend-build
          path: panel/backend/cmd/panel/web/

      - name: Build panel
        env:
          CGO_ENABLED: 0
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        working-directory: panel/backend
        run: |
          go build -ldflags="-s -w" \
            -o ../../spoof-panel-${{ matrix.goos }}-${{ matrix.goarch }} ./cmd/panel/

      - name: Verify binary
        run: |
          file spoof-panel-${{ matrix.goos }}-${{ matrix.goarch }}
          ls -lh spoof-panel-${{ matrix.goos }}-${{ matrix.goarch }}

      - name: Upload panel binary
        uses: actions/upload-artifact@v4
        with:
          name: panel-${{ matrix.goos }}-${{ matrix.goarch }}
          path: spoof-panel-${{ matrix.goos }}-${{ matrix.goarch }}
          retention-days: 1

  # ─── Create Release (tunnel + panel) ───
  release:
    needs: [build-tunnel, build-panel]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List artifacts
        run: ls -lh dist/

      - name: Generate checksums
        working-directory: dist
        run: |
          sha256sum spoof-* > checksums.txt
          cat checksums.txt

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/spoof-*
            dist/checksums.txt
