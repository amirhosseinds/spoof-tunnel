name: Build & Release

on:
  push:
    tags:
      - 'v*'
      - '!panel-v*'

permissions:
  contents: write

env:
  GO_VERSION: '1.23'
  NODE_VERSION: '20'

jobs:
  # ─── Build spoof-tunnel (CGO_ENABLED=0, all platforms) ───
  build-tunnel:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            suffix: ''
          - goos: linux
            goarch: arm64
            suffix: ''
          - goos: freebsd
            goarch: amd64
            suffix: ''
          - goos: freebsd
            goarch: arm64
            suffix: ''
          - goos: openbsd
            goarch: amd64
            suffix: ''
          - goos: openbsd
            goarch: arm64
            suffix: ''

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Build
        env:
          CGO_ENABLED: 0
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          BINARY_NAME="spoof-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.suffix }}"
          go build -ldflags="-s -w" -o "${BINARY_NAME}" ./cmd/spoof/
          echo "BINARY_NAME=${BINARY_NAME}" >> $GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: spoof-${{ matrix.goos }}-${{ matrix.goarch }}
          path: ${{ env.BINARY_NAME }}
          retention-days: 1

  # ─── Build panel frontend ───
  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install & Build
        working-directory: panel/frontend
        run: |
          npm ci
          npm run build

      - name: Upload frontend build
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: panel/frontend/out/
          retention-days: 1

  # ─── Build panel (amd64, native CGO for SQLite) ───
  build-panel-amd64:
    needs: build-frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Download frontend build
        uses: actions/download-artifact@v4
        with:
          name: frontend-build
          path: panel/backend/cmd/panel/web/

      - name: Build panel (amd64)
        env:
          CGO_ENABLED: 1
          GOOS: linux
          GOARCH: amd64
        working-directory: panel/backend
        run: |
          go build -ldflags="-s -w" \
            -o ../../spoof-panel-linux-amd64 ./cmd/panel/

      - name: Upload panel binary
        uses: actions/upload-artifact@v4
        with:
          name: panel-amd64
          path: spoof-panel-linux-amd64
          retention-days: 1

  # ─── Build panel (arm64, zig cross-compiler for CGO) ───
  build-panel-arm64:
    needs: build-frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Install zig (cross-compiler)
        run: |
          ZIG_VERSION="0.13.0"
          curl -sSLo /tmp/zig.tar.xz "https://ziglang.org/download/${ZIG_VERSION}/zig-linux-x86_64-${ZIG_VERSION}.tar.xz"
          tar xf /tmp/zig.tar.xz -C $HOME/
          echo "$HOME/zig-linux-x86_64-${ZIG_VERSION}" >> $GITHUB_PATH
          $HOME/zig-linux-x86_64-${ZIG_VERSION}/zig version

      - name: Download frontend build
        uses: actions/download-artifact@v4
        with:
          name: frontend-build
          path: panel/backend/cmd/panel/web/

      - name: Build panel (arm64)
        env:
          CGO_ENABLED: 1
          GOOS: linux
          GOARCH: arm64
          CC: "zig cc -target aarch64-linux-musl"
          CXX: "zig c++ -target aarch64-linux-musl"
        working-directory: panel/backend
        run: |
          go build -ldflags="-s -w -linkmode external -extldflags '-static'" \
            -o ../../spoof-panel-linux-arm64 ./cmd/panel/

      - name: Upload panel binary
        uses: actions/upload-artifact@v4
        with:
          name: panel-arm64
          path: spoof-panel-linux-arm64
          retention-days: 1

  # ─── Create Release (tunnel + panel) ───
  release:
    needs: [build-tunnel, build-panel-amd64, build-panel-arm64]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List artifacts
        run: ls -lh dist/

      - name: Generate checksums
        working-directory: dist
        run: |
          sha256sum spoof-* spoof-panel-* 2>/dev/null > checksums.txt || true
          cat checksums.txt

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/spoof-*
            dist/checksums.txt
